<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <title>Recupero password — Focacceria delle Langhe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}:root{--g:#DFA145;--b:#0a0a0a;--card:#141414;--w:#fff;--mut:#aaa;--line:rgba(223,161,69,.25);--danger:#ff8d82;--ok:#80d59a}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--b);color:var(--w);font-family:Raleway,sans-serif}
    .card{width:100%;max-width:430px;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.45)}
    .brand{margin-bottom:8px;color:var(--g);font-family:Cinzel,serif;font-weight:700;font-size:14px;letter-spacing:1.4px;text-transform:uppercase}
    h1{margin:0 0 10px;color:var(--g);font-family:Cinzel,serif;font-size:23px}.intro{margin:0 0 22px;color:#d0d0d0;font-size:14px;line-height:1.55}
    .field{margin:14px 0}label{display:block;margin-bottom:7px;color:var(--g);font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase}
    input{width:100%;padding:13px 12px;color:#fff;background:#0d0d0d;border:1px solid #333;border-radius:10px;outline:none;font:inherit}input:focus{border-color:var(--g)}
    button{width:100%;margin-top:8px;padding:12px 14px;background:var(--g);color:#0a0a0a;border:1px solid var(--g);border-radius:10px;font:inherit;font-weight:700;cursor:pointer}button:disabled{opacity:.55;cursor:default}
    .message{min-height:20px;margin-top:14px;font-size:13px;line-height:1.45}.error{color:var(--danger)}.ok{color:var(--ok)}.hidden{display:none}
    .back{display:inline-block;margin-top:18px;color:var(--mut);font-size:12px;text-decoration:none}.back:hover{color:var(--g)}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Focacceria delle Langhe</div>
    <h1>Nuova password</h1>
    <p id="intro" class="intro">Verifica del link di recupero in corso…</p>
    <form id="resetForm" class="hidden">
      <div class="field"><label for="password">Nuova password</label><input id="password" type="password" autocomplete="new-password" minlength="8" required></div>
      <div class="field"><label for="passwordConfirm">Conferma password</label><input id="passwordConfirm" type="password" autocomplete="new-password" minlength="8" required></div>
      <button id="submitBtn" type="submit">Imposta nuova password</button>
    </form>
    <div id="message" class="message"></div>
    <a class="back" href="admin.html">← Torna all'Area Admin</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL='https://hvvgeiemvmbmbhnybdfq.supabase.co';
    const SUPABASE_KEY='sb_publishable_o03R7Rv3A_mu52aVTvHL3g_zX3QY-6V';
    const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const intro=document.getElementById('intro');
    const form=document.getElementById('resetForm');
    const message=document.getElementById('message');
    const submitBtn=document.getElementById('submitBtn');
    let recoveryReady=false;

    function showRecoveryForm(){recoveryReady=true;intro.textContent='Inserisci la nuova password per il tuo account amministratore.';form.classList.remove('hidden');message.textContent='';message.className='message'}
    function showInvalidLink(){recoveryReady=false;intro.textContent='Il link di recupero non è valido oppure è scaduto.';form.classList.add('hidden');message.textContent='Richiedi un nuovo link di recupero password da Supabase.';message.className='message error'}

    db.auth.onAuthStateChange((event,session)=>{if(event==='PASSWORD_RECOVERY'&&session)showRecoveryForm()});

    async function initializeRecovery(){
      try{
        const {data,error}=await db.auth.getSession();
        if(error){showInvalidLink();return}
        if(data?.session){showRecoveryForm();return}
        setTimeout(()=>{if(!recoveryReady)showInvalidLink()},1500);
      }catch(err){console.error(err);showInvalidLink()}
    }

    form.addEventListener('submit',async(event)=>{
      event.preventDefault();
      const password=document.getElementById('password').value;
      const passwordConfirm=document.getElementById('passwordConfirm').value;
      message.textContent='';message.className='message';
      if(password.length<8){message.textContent='La password deve contenere almeno 8 caratteri.';message.className='message error';return}
      if(password!==passwordConfirm){message.textContent='Le due password non coincidono.';message.className='message error';return}
      submitBtn.disabled=true;submitBtn.textContent='Aggiornamento…';
      try{
        const {error}=await db.auth.updateUser({password});
        if(error)throw error;
        message.textContent='Password aggiornata correttamente. Ora puoi accedere all’Area Admin.';message.className='message ok';form.classList.add('hidden');intro.textContent='Operazione completata.';
      }catch(err){console.error(err);message.textContent=err?.message||'Errore durante l’aggiornamento della password.';message.className='message error';submitBtn.disabled=false;submitBtn.textContent='Imposta nuova password'}
    });

    initializeRecovery();
  </script>
</body>
</html>
